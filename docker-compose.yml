services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: arkheion
      POSTGRES_PASSWORD: arkheion
      POSTGRES_DB: arkheion_production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arkheion"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "80:80"
    environment:
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DB_HOST: db
      DB_USERNAME: arkheion
      DB_PASSWORD: arkheion
      DB_NAME: arkheion_production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
